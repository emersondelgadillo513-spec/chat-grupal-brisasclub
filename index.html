<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Grupo Abierto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0faf5;min-height:100dvh;display:flex;align-items:center;justify-content:center;}

:root{
  --g50:#E1F5EE;--g100:#9FE1CB;--g400:#1D9E75;--g600:#0F6E56;--g800:#085041;
}

#app{width:100%;max-width:520px;height:100dvh;max-height:700px;display:flex;flex-direction:column;}
@media(max-width:520px){#app{max-height:100dvh;border-radius:0;}}

/* JOIN */
#join-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:22px;padding:2rem 1.5rem;
  background:linear-gradient(160deg,#E1F5EE 0%,#f5fdf9 60%,#ffffff 100%);
  border-radius:16px;
}
@media(max-width:520px){#join-screen{border-radius:0;}}
.join-icon{width:80px;height:80px;border-radius:50%;background:var(--g400);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(29,158,117,0.28);}
.join-title{font-size:24px;font-weight:600;color:var(--g800);text-align:center;}
.join-sub{font-size:14px;color:var(--g600);text-align:center;line-height:1.5;}
.join-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px;}
#username-input{
  padding:13px 16px;border:1.5px solid var(--g100);border-radius:12px;
  font-size:16px;background:#fff;color:#1a1a1a;outline:none;width:100%;
}
#username-input:focus{border-color:var(--g400);}
.join-btn{
  padding:14px;border-radius:12px;border:none;background:var(--g400);color:#fff;
  font-size:16px;font-weight:600;cursor:pointer;
  box-shadow:0 3px 12px rgba(29,158,117,0.3);transition:background .15s;
}
.join-btn:active{background:var(--g600);}
.join-hint{font-size:12px;color:var(--g600);opacity:0.7;text-align:center;}

/* CHAT */
#chat-screen{flex:1;display:none;flex-direction:column;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.10);}
@media(max-width:520px){#chat-screen{border-radius:0;}}

.header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--g400);flex-shrink:0;}
.header-av{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-title{font-size:16px;font-weight:600;color:#fff;margin:0;}
.header-sub{font-size:12px;color:rgba(255,255,255,0.8);margin:0;}
.leave-btn{margin-left:auto;background:rgba(255,255,255,0.2);border:none;border-radius:20px;cursor:pointer;color:#fff;font-size:12px;padding:6px 12px;font-weight:500;}
.leave-btn:active{background:rgba(255,255,255,0.35);}

#messages{
  flex:1;overflow-y:auto;padding:12px 12px;
  display:flex;flex-direction:column;gap:2px;background:#f0faf5;
}
#messages::-webkit-scrollbar{width:3px;}
#messages::-webkit-scrollbar-thumb{background:var(--g100);border-radius:3px;}

.sys-msg{text-align:center;font-size:11px;color:var(--g600);opacity:0.75;padding:8px 0;}

.bubble-me{background:var(--g400);color:#fff;border-radius:16px 4px 16px 16px;padding:9px 13px;font-size:15px;line-height:1.45;word-break:break-word;white-space:pre-wrap;max-width:78%;}
.bubble-other{background:#fff;color:#1a1a1a;border-radius:4px 16px 16px 16px;border:0.5px solid var(--g100);padding:9px 13px;font-size:15px;line-height:1.45;word-break:break-word;white-space:pre-wrap;max-width:78%;}
.bubble-img{padding:4px;max-width:78%;}
.bubble-img-me{border-radius:16px 4px 16px 16px;background:var(--g400);}
.bubble-img-other{border-radius:4px 16px 16px 16px;background:#fff;border:0.5px solid var(--g100);}
.bubble-img img{max-width:min(220px,60vw);max-height:220px;border-radius:12px;display:block;cursor:zoom-in;}

.ts{font-size:10px;color:var(--g600);opacity:0.6;margin-top:3px;padding:0 3px;}

/* Preview */
#preview-bar{display:none;padding:8px 12px;background:#fff;border-top:0.5px solid var(--g100);align-items:center;gap:10px;flex-shrink:0;}
#preview-thumb{height:52px;width:52px;object-fit:cover;border-radius:8px;border:0.5px solid var(--g100);}
.cancel-btn{background:none;border:none;cursor:pointer;color:var(--g600);font-size:24px;line-height:1;}
.confirm-btn{padding:8px 16px;border-radius:20px;border:none;background:var(--g400);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-left:auto;}
.confirm-btn:active{background:var(--g600);}

/* Input */
#input-bar{padding:8px 10px;border-top:0.5px solid var(--g100);background:#fff;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;padding-bottom:max(8px, env(safe-area-inset-bottom));}
.photo-btn{width:42px;height:42px;border-radius:50%;border:0.5px solid var(--g100);background:var(--g50);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--g600);}
.photo-btn:active{background:var(--g100);}
#msg-input{flex:1;padding:10px 14px;border:1px solid var(--g100);border-radius:22px;font-size:16px;resize:none;max-height:110px;background:#f0faf5;color:#1a1a1a;font-family:inherit;line-height:1.4;outline:none;overflow-y:auto;}
#msg-input:focus{border-color:var(--g400);background:#fff;}
.send-btn{width:42px;height:42px;border-radius:50%;border:none;background:var(--g400);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:active{background:var(--g600);}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox-img{max-width:95vw;max-height:92vh;border-radius:8px;object-fit:contain;}
</style>
</head>
<body>

<div id="app">

  <div id="join-screen">
    <div class="join-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <div>
      <p class="join-title">Grupo abierto</p>
      <p class="join-sub" style="margin-top:6px;">Escribe tu nombre para unirte<br/>y empieza a chatear</p>
    </div>
    <div class="join-form">
      <input id="username-input" type="text" placeholder="¿Cómo te llamas?" maxlength="24" autocomplete="off" autocorrect="off"/>
      <button class="join-btn" onclick="joinChat()">Entrar al grupo</button>
    </div>
    <p class="join-hint">Los mensajes son visibles para todos los participantes</p>
  </div>

  <div id="chat-screen">
    <div class="header">
      <div class="header-av">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div>
        <p class="header-title">Grupo abierto</p>
        <p class="header-sub" id="member-count">en línea</p>
      </div>
      <button class="leave-btn" onclick="leaveChat()">Salir</button>
    </div>

    <div id="messages"></div>

    <div id="preview-bar">
      <img id="preview-thumb" alt=""/>
      <span style="font-size:13px;color:var(--g600);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="preview-name"></span>
      <button class="cancel-btn" onclick="cancelPhoto()">×</button>
      <button class="confirm-btn" onclick="confirmSendPhoto()">Enviar foto</button>
    </div>

    <div id="input-bar">
      <button class="photo-btn" onclick="document.getElementById('file-input').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input id="file-input" type="file" accept="image/*" style="display:none;" onchange="onFileChosen(event)"/>
      <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1" maxlength="1000"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<div id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" alt="foto"/>
</div>

<script>
const STORAGE_KEY = 'grupo_chat_msgs';
const MAX_MSGS = 80;

let myName = '', myId = 'u_' + Math.random().toString(36).slice(2, 8);
let pollInterval = null, lastMsgId = null, pendingFile = null;
const imgCache = new Map();

const PAL = [
  {fg:'#085041',bg:'#9FE1CB'},{fg:'#3C3489',bg:'#CECBF6'},
  {fg:'#993C1D',bg:'#F5C4B3'},{fg:'#993556',bg:'#F4C0D1'},
  {fg:'#3B6D11',bg:'#C0DD97'},{fg:'#633806',bg:'#FAC775'},
  {fg:'#791F1F',bg:'#F7C1C1'},{fg:'#0C447C',bg:'#B5D4F4'}
];

function colorFor(n) {
  let h = 0;
  for (let c of n) h = (h * 31 + c.charCodeAt(0)) % PAL.length;
  return PAL[h];
}
function initials(n) { return n.split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase() || '?'; }
function timeStr(ts) { return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

function getMsgs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveMsgs(msgs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
}
function pruneOld(msgs) {
  if (msgs.length > MAX_MSGS) msgs.splice(0, msgs.length - MAX_MSGS);
}

async function compressImage(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900; let w = img.width, h = img.height;
        if (w > MAX) { h = h * MAX / w; w = MAX; }
        if (h > MAX) { w = w * MAX / h; h = MAX; }
        const cv = document.createElement('canvas');
        cv.width = Math.round(w); cv.height = Math.round(h);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        res(cv.toDataURL('image/jpeg', 0.75));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function joinChat() {
  const inp = document.getElementById('username-input');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  myName = name;
  document.getElementById('join-screen').style.display = 'none';
  const cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';
  announcePresence();
  loadMessages();
  startPolling();
  const mi = document.getElementById('msg-input');
  mi.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
  mi.addEventListener('input', () => { mi.style.height = 'auto'; mi.style.height = Math.min(mi.scrollHeight, 110) + 'px'; });
  mi.focus();
}

function leaveChat() {
  clearInterval(pollInterval); myName = '';
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('join-screen').style.display = 'flex';
  document.getElementById('username-input').value = '';
  document.getElementById('messages').innerHTML = '';
  lastMsgId = null; cancelPhoto();
}

function announcePresence() {
  const msgs = getMsgs();
  msgs.push({ id: 'm' + Date.now() + Math.random().toString(36).slice(2), type: 'system', text: myName + ' se unió al grupo', ts: Date.now() });
  pruneOld(msgs); saveMsgs(msgs);
  bc.postMessage({ type: 'new_msg' });
}

function sendMsg() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || !myName) return;
  inp.value = ''; inp.style.height = 'auto';
  const msgs = getMsgs();
  msgs.push({ id: 'm' + Date.now() + Math.random().toString(36).slice(2), type: 'text', name: myName, uid: myId, text, ts: Date.now() });
  pruneOld(msgs); saveMsgs(msgs);
  bc.postMessage({ type: 'new_msg' });
  renderMessages(msgs);
}

function onFileChosen(e) {
  const file = e.target.files[0]; if (!file) return;
  pendingFile = file;
  document.getElementById('preview-thumb').src = URL.createObjectURL(file);
  const n = file.name;
  document.getElementById('preview-name').textContent = n.length > 28 ? n.slice(0, 28) + '...' : n;
  document.getElementById('preview-bar').style.display = 'flex';
  e.target.value = '';
}

function cancelPhoto() {
  pendingFile = null;
  document.getElementById('preview-bar').style.display = 'none';
  document.getElementById('preview-thumb').src = '';
}

async function confirmSendPhoto() {
  if (!pendingFile || !myName) return;
  const file = pendingFile; cancelPhoto();
  const base64 = await compressImage(file);
  const imgKey = 'img_' + Date.now() + Math.random().toString(36).slice(2, 8);
  try { localStorage.setItem(imgKey, base64); } catch(e) { alert('Foto muy grande para almacenar localmente.'); return; }
  imgCache.set(imgKey, base64);
  const msgs = getMsgs();
  msgs.push({ id: 'm' + Date.now() + Math.random().toString(36).slice(2), type: 'image', name: myName, uid: myId, imgKey, ts: Date.now() });
  pruneOld(msgs); saveMsgs(msgs);
  bc.postMessage({ type: 'new_msg' });
  renderMessages(msgs);
}

function getImg(key) {
  if (imgCache.has(key)) return imgCache.get(key);
  const d = localStorage.getItem(key);
  if (d) imgCache.set(key, d);
  return d;
}

function loadMessages() {
  const msgs = getMsgs();
  renderMessages(msgs);
  if (msgs.length > 0) lastMsgId = msgs[msgs.length - 1].id;
}

function renderMessages(msgs) {
  const container = document.getElementById('messages');
  const atBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
  container.innerHTML = '';
  let prevUid = null, prevTs = 0;

  for (const m of msgs) {
    if (m.type === 'system') {
      const el = document.createElement('div');
      el.className = 'sys-msg'; el.textContent = m.text;
      container.appendChild(el); prevUid = null; continue;
    }
    const isMe = m.uid === myId;
    const c = colorFor(m.name);
    const showHeader = m.uid !== prevUid || (m.ts - prevTs > 120000);
    prevUid = m.uid; prevTs = m.ts;

    const row = document.createElement('div');
    row.style.cssText = `display:flex;flex-direction:${isMe ? 'row-reverse' : 'row'};align-items:flex-end;gap:7px;margin-top:${showHeader ? '8' : '2'}px;`;

    if (!isMe) {
      const av = document.createElement('div');
      if (showHeader) {
        av.style.cssText = `width:30px;height:30px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:${c.fg};flex-shrink:0;`;
        av.textContent = initials(m.name);
      } else {
        av.style.cssText = 'width:30px;flex-shrink:0;';
      }
      row.appendChild(av);
    }

    const col = document.createElement('div');
    col.style.cssText = `display:flex;flex-direction:column;align-items:${isMe ? 'flex-end' : 'flex-start'};`;

    if (showHeader && !isMe) {
      const nm = document.createElement('div');
      nm.style.cssText = `font-size:11px;font-weight:600;color:${c.fg};margin-bottom:3px;padding-left:3px;`;
      nm.textContent = m.name; col.appendChild(nm);
    }

    const bubble = document.createElement('div');
    if (m.type === 'text') {
      bubble.className = isMe ? 'bubble-me' : 'bubble-other';
      bubble.textContent = m.text;
    } else if (m.type === 'image') {
      bubble.className = 'bubble-img ' + (isMe ? 'bubble-img-me' : 'bubble-img-other');
      const img = document.createElement('img');
      img.alt = 'foto';
      img.onclick = () => openLightbox(img.src);
      const d = getImg(m.imgKey);
      if (d) img.src = d; else img.alt = '[imagen]';
      bubble.appendChild(img);
    }

    const ts = document.createElement('div');
    ts.className = 'ts'; ts.textContent = timeStr(m.ts);
    col.appendChild(bubble); col.appendChild(ts);
    row.appendChild(col);
    container.appendChild(row);
  }
  if (atBottom) container.scrollTop = container.scrollHeight;
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}

// BroadcastChannel para sincronizar entre pestañas del mismo navegador
const bc = new BroadcastChannel('grupo_chat');
bc.onmessage = () => {
  if (!myName) return;
  const msgs = getMsgs();
  const lid = msgs.length > 0 ? msgs[msgs.length - 1].id : null;
  if (lid !== lastMsgId) { lastMsgId = lid; renderMessages(msgs); }
};

function startPolling() {
  pollInterval = setInterval(() => {
    if (!myName) return;
    const msgs = getMsgs();
    const lid = msgs.length > 0 ? msgs[msgs.length - 1].id : null;
    if (lid !== lastMsgId) { lastMsgId = lid; renderMessages(msgs); }
    document.getElementById('member-count').textContent = 'grupo activo';
  }, 3000);
}

document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
</script>
</body>
</html>
