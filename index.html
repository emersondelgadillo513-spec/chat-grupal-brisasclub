
<style>
#app{font-family:var(--font-sans);max-width:680px;margin:0 auto;}
#messages::-webkit-scrollbar{width:4px;}
#messages::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:4px;}
#msg-input{outline:none;}
#msg-input:focus{border-color:var(--color-border-primary);}
.bubble-me{background:var(--color-background-info);color:var(--color-text-info);border-radius:14px 4px 14px 14px;border:none;}
.bubble-other{background:var(--color-background-primary);color:var(--color-text-primary);border-radius:4px 14px 14px 14px;border:0.5px solid var(--color-border-tertiary);}
.img-bubble{padding:4px!important;}
.img-bubble img{max-width:230px;max-height:230px;border-radius:10px;display:block;cursor:pointer;}
.send-btn:hover{opacity:0.85;}
.send-btn:active{transform:scale(0.95);}
</style>

<div id="app">

<div id="join-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:480px;gap:24px;padding:2rem;">
  <div style="text-align:center;">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-info)" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <p style="font-size:22px;font-weight:500;margin:0 0 6px;color:var(--color-text-primary);">Grupo abierto</p>
    <p style="font-size:14px;color:var(--color-text-secondary);margin:0;">Comparte el enlace para que cualquiera pueda unirse</p>
  </div>
  <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;">
    <input id="username-input" type="text" placeholder="¿Cómo te llamas?" maxlength="24"
      style="width:100%;box-sizing:border-box;padding:11px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:15px;background:var(--color-background-primary);color:var(--color-text-primary);"/>
    <button onclick="joinChat()"
      style="padding:11px;border-radius:var(--border-radius-md);border:none;background:var(--color-background-info);color:var(--color-text-info);font-size:15px;font-weight:500;cursor:pointer;">
      Entrar al grupo
    </button>
  </div>
  <p style="font-size:12px;color:var(--color-text-tertiary);text-align:center;margin:0;">Los mensajes y fotos son visibles para todos los que accedan al enlace</p>
</div>

<div id="chat-screen" style="display:none;flex-direction:column;height:560px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;">

  <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);flex-shrink:0;">
    <div style="width:38px;height:38px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-info)" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <div style="flex:1;">
      <p style="margin:0;font-size:15px;font-weight:500;color:var(--color-text-primary);">Grupo abierto</p>
      <p style="margin:0;font-size:12px;color:var(--color-text-secondary);" id="member-count">conectando...</p>
    </div>
    <button onclick="leaveChat()" style="background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-secondary);font-size:12px;padding:5px 10px;">Salir</button>
  </div>

  <div id="messages" style="flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:2px;background:var(--color-background-secondary);"></div>

  <div id="photo-preview-bar" style="display:none;padding:8px 14px;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);align-items:center;gap:10px;">
    <img id="preview-thumb" style="height:52px;width:52px;object-fit:cover;border-radius:8px;border:0.5px solid var(--color-border-tertiary);" />
    <span style="font-size:13px;color:var(--color-text-secondary);flex:1;" id="preview-name"></span>
    <button onclick="cancelPhoto()" style="background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:18px;line-height:1;">×</button>
    <button onclick="confirmSendPhoto()" style="padding:6px 14px;border-radius:var(--border-radius-md);border:none;background:var(--color-background-info);color:var(--color-text-info);font-size:13px;font-weight:500;cursor:pointer;">Enviar foto</button>
  </div>

  <div style="padding:8px 12px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;">
    <button onclick="document.getElementById('file-input').click()" title="Enviar foto"
      style="width:36px;height:36px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--color-text-secondary);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <input id="file-input" type="file" accept="image/*" style="display:none;" onchange="onFileChosen(event)"/>
    <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1" maxlength="1000"
      style="flex:1;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:18px;font-size:14px;resize:none;max-height:110px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans);line-height:1.45;overflow-y:auto;"></textarea>
    <button onclick="sendMsg()" class="send-btn"
      style="width:36px;height:36px;border-radius:50%;border:none;background:var(--color-background-info);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-info)" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

</div>

<div id="lightbox" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out;">
  <img id="lightbox-img" style="max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain;"/>
</div>

<script>
let myName='', myId='u_'+Math.random().toString(36).slice(2,8);
let pollInterval=null, lastMsgId=null, pendingFile=null;
const imgCache=new Map();
const MAX_MSGS=80;
const PALETTE=[
  {fg:'#185FA5',bg:'#E6F1FB'},{fg:'#0F6E56',bg:'#E1F5EE'},
  {fg:'#993C1D',bg:'#FAECE7'},{fg:'#993556',bg:'#FBEAF0'},
  {fg:'#534AB7',bg:'#EEEDFE'},{fg:'#854F0B',bg:'#FAEEDA'},
  {fg:'#3B6D11',bg:'#EAF3DE'},{fg:'#A32D2D',bg:'#FCEBEB'}
];

function colorFor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%PALETTE.length;return PALETTE[h];}
function initials(n){return n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';}
function timeStr(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

async function compressImage(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=900;let w=img.width,h=img.height;
        if(w>MAX){h=h*MAX/w;w=MAX;}
        if(h>MAX){w=w*MAX/h;h=MAX;}
        const cv=document.createElement('canvas');
        cv.width=Math.round(w);cv.height=Math.round(h);
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        res(cv.toDataURL('image/jpeg',0.75));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function getMsgs(){
  try{const r=await window.storage.get('chat:messages',true);return r?JSON.parse(r.value):[];}
  catch(e){return[];}
}
async function saveMsgs(msgs){await window.storage.set('chat:messages',JSON.stringify(msgs),true);}

async function getImg(key){
  if(imgCache.has(key))return imgCache.get(key);
  try{const r=await window.storage.get(key,true);if(r){imgCache.set(key,r.value);return r.value;}}
  catch(e){}
  return null;
}

function pruneOld(msgs){
  if(msgs.length<=MAX_MSGS)return;
  const removed=msgs.splice(0,msgs.length-MAX_MSGS);
  removed.forEach(m=>{if(m.imgKey)try{window.storage.delete(m.imgKey,true);}catch(e){}});
}

async function joinChat(){
  const inp=document.getElementById('username-input');
  const name=inp.value.trim();
  if(!name){inp.focus();return;}
  myName=name;
  document.getElementById('join-screen').style.display='none';
  document.getElementById('chat-screen').style.display='flex';
  await announcePresence();
  await loadMessages();
  startPolling();
  const mi=document.getElementById('msg-input');
  mi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
  mi.addEventListener('input',()=>{mi.style.height='auto';mi.style.height=Math.min(mi.scrollHeight,110)+'px';});
  mi.focus();
}

function leaveChat(){
  clearInterval(pollInterval);
  myName='';
  document.getElementById('chat-screen').style.display='none';
  document.getElementById('join-screen').style.display='flex';
  document.getElementById('username-input').value='';
  document.getElementById('messages').innerHTML='';
  lastMsgId=null;cancelPhoto();
}

async function announcePresence(){
  try{
    await window.storage.set('presence:'+myId,JSON.stringify({name:myName,ts:Date.now()}),true);
    const msgs=await getMsgs();
    msgs.push({id:'m'+Date.now()+Math.random().toString(36).slice(2),type:'system',text:myName+' se unió al grupo',ts:Date.now()});
    pruneOld(msgs);await saveMsgs(msgs);
  }catch(e){}
}

async function updatePresence(){
  try{
    await window.storage.set('presence:'+myId,JSON.stringify({name:myName,ts:Date.now()}),true);
    const keys=await window.storage.list('presence:',true);
    if(!keys||!keys.keys)return;
    const now=Date.now();let active=0;
    for(const k of keys.keys){
      try{const r=await window.storage.get(k,true);if(r){const d=JSON.parse(r.value);if(now-d.ts<35000)active++;}}catch(e){}
    }
    const el=document.getElementById('member-count');
    if(el)el.textContent=active+' en línea';
  }catch(e){}
}

async function sendMsg(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text||!myName)return;
  inp.value='';inp.style.height='auto';
  try{
    const msgs=await getMsgs();
    msgs.push({id:'m'+Date.now()+Math.random().toString(36).slice(2),type:'text',name:myName,uid:myId,text,ts:Date.now()});
    pruneOld(msgs);await saveMsgs(msgs);await renderMessages(msgs);
  }catch(e){}
}

function onFileChosen(e){
  const file=e.target.files[0];
  if(!file)return;
  pendingFile=file;
  const thumb=document.getElementById('preview-thumb');
  thumb.src=URL.createObjectURL(file);
  document.getElementById('preview-name').textContent=file.name.length>30?file.name.slice(0,30)+'...':file.name;
  const bar=document.getElementById('photo-preview-bar');
  bar.style.display='flex';
  e.target.value='';
}

function cancelPhoto(){
  pendingFile=null;
  document.getElementById('photo-preview-bar').style.display='none';
  document.getElementById('preview-thumb').src='';
}

async function confirmSendPhoto(){
  if(!pendingFile||!myName)return;
  const file=pendingFile;cancelPhoto();
  const btn=document.querySelector('#photo-preview-bar button:last-child');
  try{
    const base64=await compressImage(file);
    const imgKey='chat:img:'+Date.now()+Math.random().toString(36).slice(2,8);
    await window.storage.set(imgKey,base64,true);
    imgCache.set(imgKey,base64);
    const msgs=await getMsgs();
    msgs.push({id:'m'+Date.now()+Math.random().toString(36).slice(2),type:'image',name:myName,uid:myId,imgKey,ts:Date.now()});
    pruneOld(msgs);await saveMsgs(msgs);await renderMessages(msgs);
  }catch(e){console.error(e);}
}

async function loadMessages(){
  const msgs=await getMsgs();
  await renderMessages(msgs);
  if(msgs.length>0)lastMsgId=msgs[msgs.length-1].id;
}

async function renderMessages(msgs){
  const container=document.getElementById('messages');
  const atBottom=container.scrollHeight-container.scrollTop<=container.clientHeight+100;
  container.innerHTML='';
  let prevUid=null,prevTs=0;

  for(const m of msgs){
    if(m.type==='system'){
      const el=document.createElement('div');
      el.style.cssText='text-align:center;font-size:11px;color:var(--color-text-tertiary);padding:8px 0;';
      el.textContent=m.text;
      container.appendChild(el);prevUid=null;continue;
    }
    const isMe=m.uid===myId;
    const c=colorFor(m.name);
    const showHeader=m.uid!==prevUid||(m.ts-prevTs>120000);
    prevUid=m.uid;prevTs=m.ts;

    const row=document.createElement('div');
    row.style.cssText=`display:flex;flex-direction:${isMe?'row-reverse':'row'};align-items:flex-end;gap:7px;margin-top:${showHeader&&prevUid?'8':'1'}px;`;

    if(!isMe){
      const av=document.createElement('div');
      if(showHeader){
        av.style.cssText=`width:28px;height:28px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:${c.fg};flex-shrink:0;`;
        av.textContent=initials(m.name);
      }else{
        av.style.cssText='width:28px;flex-shrink:0;';
      }
      row.appendChild(av);
    }

    const col=document.createElement('div');
    col.style.cssText=`display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'};max-width:74%;`;

    if(showHeader&&!isMe){
      const nm=document.createElement('div');
      nm.style.cssText=`font-size:11px;font-weight:500;color:${c.fg};margin-bottom:3px;padding-left:3px;`;
      nm.textContent=m.name;col.appendChild(nm);
    }

    const bubble=document.createElement('div');
    const baseStyle=`padding:${m.type==='image'?'4px':'7px 11px'};`;
    bubble.className=(isMe?'bubble-me':'bubble-other')+(m.type==='image'?' img-bubble':'');
    bubble.style.cssText=baseStyle;

    if(m.type==='text'){
      bubble.style.fontSize='14px';bubble.style.lineHeight='1.45';
      bubble.style.wordBreak='break-word';bubble.style.whiteSpace='pre-wrap';
      bubble.textContent=m.text;
    }else if(m.type==='image'){
      const img=document.createElement('img');
      img.alt='foto';img.style.cssText='max-width:230px;max-height:230px;border-radius:10px;display:block;cursor:zoom-in;';
      img.onclick=()=>openLightbox(img.src);
      (async()=>{const d=await getImg(m.imgKey);if(d)img.src=d;})();
      bubble.appendChild(img);
    }

    const ts=document.createElement('div');
    ts.style.cssText='font-size:10px;color:var(--color-text-tertiary);margin-top:2px;padding:0 3px;';
    ts.textContent=timeStr(m.ts);
    col.appendChild(bubble);col.appendChild(ts);
    row.appendChild(col);
    container.appendChild(row);
  }
  if(atBottom)container.scrollTop=container.scrollHeight;
}

function openLightbox(src){
  const lb=document.getElementById('lightbox');
  document.getElementById('lightbox-img').src=src;
  lb.style.display='flex';
}

function startPolling(){
  updatePresence();
  pollInterval=setInterval(async()=>{
    if(!myName)return;
    try{
      const msgs=await getMsgs();
      const lid=msgs.length>0?msgs[msgs.length-1].id:null;
      if(lid!==lastMsgId){lastMsgId=lid;await renderMessages(msgs);}
      await updatePresence();
    }catch(e){}
  },2500);
}
</script>
